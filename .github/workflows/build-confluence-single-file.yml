name: build-confluence-single-file

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build single-file Confluence HTML
        run: npm run build:confluence

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: confluence-embed-html
          path: dist/confluence-embed.html
